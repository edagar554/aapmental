         style="background-image: url('imagenes/semillas2.png');"

        <div id="contenedor-semillas" class="grid-semillas">
            </div>
    </main>

    <script type="module">
        import semillas from './semillas.js';

        const contenedor = document.getElementById('contenedor-semillas');

        semillas.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.borderLeftColor = s.color;

            div.innerHTML = `
                <h2 style="color: ${s.color}">${s.nombre}</h2>
                <p><em>${s.descripcion}</em></p>
                <ul>
                    ${s.beneficios.map(b => `<li>${b}</li>`).join('')}
                </ul>
                <div class="prep-info">
                    <strong>Modo de uso:</strong> ${s.preparacion}<br>
                    <strong>Sugerencia:</strong> ${s.dosis}
                </div>
            `;
            contenedor.appendChild(div);
        });
    </script>
